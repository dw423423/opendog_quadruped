name: Verify Deb

# Called by build-deb.yml after release assets are uploaded, or run manually to
# re-verify any existing release tag.
on:
  workflow_call:
    inputs:
      release_tag:
        description: "Release tag to verify (e.g. v1.0.0)"
        required: true
        type: string
      ros_distro:
        description: "ROS 2 distro (empty = verify jazzy and lyrical)"
        required: false
        default: ""
        type: string
  workflow_dispatch:
    inputs:
      release_tag:
        description: "Release tag to verify (e.g. v1.0.0)"
        required: true
        type: string
      ros_distro:
        description: "ROS 2 distro (empty = verify jazzy and lyrical)"
        required: false
        default: ""
        type: choice
        options:
          - ""
          - jazzy
          - lyrical

permissions:
  contents: read

concurrency:
  # In workflow_call, github.workflow is the caller workflow name. Keep this
  # group independent from build-deb.yml to avoid caller/callee deadlocks.
  group: verify-deb-${{ inputs.release_tag || github.ref_name }}
  cancel-in-progress: true

jobs:
  select_matrix:
    name: select verify matrix
    runs-on: ubuntu-24.04
    outputs:
      matrix: ${{ steps.set_matrix.outputs.matrix }}
    steps:
      - name: Compute matrix from input
        id: set_matrix
        shell: bash
        run: |
          set -eo pipefail
          selected="${{ inputs.ros_distro }}"
          if [[ -z "${selected}" ]]; then
            matrix='{"include":[{"ros_distro":"jazzy","arch":"amd64","runner":"ubuntu-24.04","image":"ros:jazzy-ros-base-noble"},{"ros_distro":"jazzy","arch":"arm64","runner":"ubuntu-24.04-arm","image":"ros:jazzy-ros-base-noble"},{"ros_distro":"lyrical","arch":"amd64","runner":"ubuntu-24.04","image":"ros:lyrical-ros-base-resolute"},{"ros_distro":"lyrical","arch":"arm64","runner":"ubuntu-24.04-arm","image":"ros:lyrical-ros-base-resolute"}]}'
          elif [[ "${selected}" == "jazzy" ]]; then
            matrix='{"include":[{"ros_distro":"jazzy","arch":"amd64","runner":"ubuntu-24.04","image":"ros:jazzy-ros-base-noble"},{"ros_distro":"jazzy","arch":"arm64","runner":"ubuntu-24.04-arm","image":"ros:jazzy-ros-base-noble"}]}'
          elif [[ "${selected}" == "lyrical" ]]; then
            matrix='{"include":[{"ros_distro":"lyrical","arch":"amd64","runner":"ubuntu-24.04","image":"ros:lyrical-ros-base-resolute"},{"ros_distro":"lyrical","arch":"arm64","runner":"ubuntu-24.04-arm","image":"ros:lyrical-ros-base-resolute"}]}'
          else
            echo "Unsupported ros_distro input: ${selected}" >&2
            exit 1
          fi
          echo "matrix=${matrix}" >> "$GITHUB_OUTPUT"

  verify_deb:
    name: verify deb (${{ matrix.ros_distro }}, ${{ matrix.arch }})
    needs: select_matrix
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix: ${{ fromJson(needs.select_matrix.outputs.matrix) }}
    container:
      image: ${{ matrix.image }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Resolve metadata
        id: meta
        shell: bash
        env:
          DEB_FILE_PREFIX: ros-${{ matrix.ros_distro }}-ocs2
        run: |
          set -eo pipefail
          chmod +x scripts/*.sh

          release_tag="${{ inputs.release_tag }}"
          if [[ "${release_tag}" != [vV]* ]]; then
            release_tag="v${release_tag}"
          fi

          ros_distro="${{ matrix.ros_distro }}"
          deb_version="${release_tag#v}"
          deb_version="${deb_version#V}"
          deb_version="${deb_version//\//-}"
          if [[ -z "${deb_version}" ]]; then
            echo "Unable to derive a deb version from release tag: ${release_tag}" >&2
            exit 1
          fi
          deb_arch="${{ matrix.arch }}"
          deb_file="${DEB_FILE_PREFIX}_${deb_version}_${deb_arch}.deb"

          echo "release_tag=${release_tag}" >> "$GITHUB_OUTPUT"
          echo "ros_distro=${ros_distro}" >> "$GITHUB_OUTPUT"
          echo "deb_version=${deb_version}" >> "$GITHUB_OUTPUT"
          echo "deb_arch=${deb_arch}" >> "$GITHUB_OUTPUT"
          echo "deb_file=${deb_file}" >> "$GITHUB_OUTPUT"
          echo "install_prefix=/opt/ros/${ros_distro}" >> "$GITHUB_OUTPUT"

          echo "Tag: ${release_tag}, distro: ${ros_distro}, arch: ${deb_arch}, deb: ${deb_file}"

      # Match build-deb: Jazzy on Noble, Lyrical on Resolute. Noble apt has no
      # ros-lyrical-* packages (Tier 1 Lyrical is Ubuntu 26.04 only).
      - name: Install verify tools
        shell: bash
        run: |
          set -eo pipefail
          apt-get update
          apt-get install -y curl ca-certificates cmake build-essential git
          if ! command -v gh >/dev/null 2>&1; then
            curl -fsSL https://cli.github.com/packages/githubcli-archive-keyring.gpg \
              | dd of=/usr/share/keyrings/githubcli-archive-keyring.gpg
            chmod go+r /usr/share/keyrings/githubcli-archive-keyring.gpg
            echo "deb [arch=$(dpkg --print-architecture) signed-by=/usr/share/keyrings/githubcli-archive-keyring.gpg] https://cli.github.com/packages stable main" \
              > /etc/apt/sources.list.d/github-cli.list
            apt-get update
            apt-get install -y gh
          fi
          gh --version
          if [[ ! -f /opt/ros/${{ matrix.ros_distro }}/setup.bash ]]; then
            echo "Expected ROS under /opt/ros/${{ matrix.ros_distro }} (image ${{ matrix.image }})" >&2
            ls -la "/opt/ros" || true
            exit 1
          fi
          # shellcheck disable=SC1091
          source "/opt/ros/${{ matrix.ros_distro }}/setup.bash"
          test "${ROS_DISTRO}" = "${{ matrix.ros_distro }}"
          ros2 pkg list | head -5

      - name: Download deb from release
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          set -eo pipefail
          deb_file="${{ steps.meta.outputs.deb_file }}"
          release_tag="${{ steps.meta.outputs.release_tag }}"

          # The publish job has completed, but keep a short wait for GitHub's
          # release asset API to become consistent on both architectures.
          for attempt in {1..60}; do
            rm -f "${deb_file}"
            if gh release download "${release_tag}" \
              --repo "${GITHUB_REPOSITORY}" \
              --pattern "${deb_file}"; then
              break
            fi
            echo "Asset ${deb_file} is not available yet (attempt ${attempt}/60); retrying in 30s..."
            sleep 30
          done

          if [[ ! -f "${deb_file}" ]]; then
            echo "Timed out waiting for ${deb_file} in release ${release_tag}." >&2
            echo "Current release assets:" >&2
            gh release view "${release_tag}" \
              --repo "${GITHUB_REPOSITORY}" \
              --json assets \
              --jq '.assets[].name' || true
            exit 1
          fi

          echo "Downloaded: ${deb_file}"
          ls -lh "${deb_file}"

      - name: Install deb and verify downstream configure
        shell: bash
        run: |
          set -eo pipefail
          chmod +x scripts/*.sh
          scripts/consume_release_deb.sh \
            --deb-file "${{ steps.meta.outputs.deb_file }}" \
            --ros-distro "${{ steps.meta.outputs.ros_distro }}" \
            --install-prefix "${{ steps.meta.outputs.install_prefix }}"
