# Controller Manager configuration
controller_manager:
  ros__parameters:
    update_rate: 1000  # Hz

    # Define the available controllers
    joint_state_broadcaster:
      type: joint_state_broadcaster/JointStateBroadcaster

    imu_sensor_broadcaster:
      type: imu_sensor_broadcaster/IMUSensorBroadcaster

    unitree_guide_controller:
      type: unitree_guide_controller/UnitreeGuideController

    ocs2_quadruped_controller:
      type: ocs2_quadruped_controller/Ocs2QuadrupedController

    rl_quadruped_controller:
      type: rl_quadruped_controller/LeggedGymController

imu_sensor_broadcaster:
  ros__parameters:
    sensor_name: "imu_sensor"
    frame_id: "imu_link"

ocs2_quadruped_controller:
  ros__parameters:
    update_rate: 200  # Hz
    robot_pkg: "go2_description"
    enable_perceptive: true
    default_kp: 20.0
    default_kd: 5.5
    feet_force_threshold: 4.0
    joints:
      - FL_hip_joint
      - FL_thigh_joint
      - FL_calf_joint
      - FR_hip_joint
      - FR_thigh_joint
      - FR_calf_joint
      - RL_hip_joint
      - RL_thigh_joint
      - RL_calf_joint
      - RR_hip_joint
      - RR_thigh_joint
      - RR_calf_joint

    command_interfaces:
      - effort
      - position
      - velocity
      - kp
      - kd

    state_interfaces:
      - effort
      - position
      - velocity

    feet:
      - FL_foot
      - FR_foot
      - RL_foot
      - RR_foot

    stair_test_mode: "off"
    stair_x_start: 1.0
    step_height: 0.03
    step_depth: 0.35
    step_width: 1.0
    stair_y_center: 0.0
    lf_target_y: 0.12
    rf_target_y: -0.12

    stair_foothold:
      enable: false
      step_x_start: 0.40
      step_height: 0.15
      step_depth: 0.35
      step_width: 0.80
      stair_y_center: 0.0
      num_steps: 2
      edge_margin_x: 0.04
      edge_margin_y: 0.03
      active_region_half_length_x: 0.10
      active_region_half_length_y: 0.06
      prefer_stair_top_when_inside_footprint: true
      lock_region_during_swing: true

    fixed_foothold_regions:
      enable: false
      frame: "world"
      FL:
        x_min: 0.25
        x_max: 0.35
        y_min: 0.10
        y_max: 0.18
        z: 0.0
      FR:
        x_min: 0.25
        x_max: 0.35
        y_min: -0.18
        y_max: -0.10
        z: 0.0
      RL:
        x_min: -0.05
        x_max: 0.05
        y_min: 0.10
        y_max: 0.18
        z: 0.0
      RR:
        x_min: -0.05
        x_max: 0.05
        y_min: -0.18
        y_max: -0.10
        z: 0.0

    fixed_foothold_sequence:
      enable: false
      frame: "world"
      manual_advance: true
      advance_key: "g"
      pause_gait_on_set_completed: true
      resume_gait_after_advance: "static_walk"
      auto_stance_on_final: true
      require_z_for_reached: true
      z_tolerance: 0.04
      stable_hold_time: 0.3
      active_set: 0
      set_names:
        - set0_ground
        - set1_front_feet_step1
        - set2_front_feet_step2_rear_feet_step1

      set0_ground:
        FL:
          x_min: 0.25
          x_max: 0.35
          y_min: 0.10
          y_max: 0.18
          z: 0.0
        FR:
          x_min: 0.25
          x_max: 0.35
          y_min: -0.18
          y_max: -0.10
          z: 0.0
        RL:
          x_min: -0.05
          x_max: 0.05
          y_min: 0.10
          y_max: 0.18
          z: 0.0
        RR:
          x_min: -0.05
          x_max: 0.05
          y_min: -0.18
          y_max: -0.10
          z: 0.0

      set1_front_feet_step1:
        FL:
          x_min: 0.45
          x_max: 0.55
          y_min: 0.10
          y_max: 0.18
          z: 0.15
        FR:
          x_min: 0.45
          x_max: 0.55
          y_min: -0.18
          y_max: -0.10
          z: 0.15
        RL:
          x_min: 0.15
          x_max: 0.25
          y_min: 0.10
          y_max: 0.18
          z: 0.0
        RR:
          x_min: 0.15
          x_max: 0.25
          y_min: -0.18
          y_max: -0.10
          z: 0.0

      set2_front_feet_step2_rear_feet_step1:
        FL:
          x_min: 0.85
          x_max: 0.95
          y_min: 0.10
          y_max: 0.18
          z: 0.30
        FR:
          x_min: 0.85
          x_max: 0.95
          y_min: -0.18
          y_max: -0.10
          z: 0.30
        RL:
          x_min: 0.45
          x_max: 0.55
          y_min: 0.10
          y_max: 0.18
          z: 0.15
        RR:
          x_min: 0.45
          x_max: 0.55
          y_min: -0.18
          y_max: -0.10
          z: 0.15

    imu_name: "imu_sensor"
    base_name: "base"

    imu_interfaces:
      - orientation.w
      - orientation.x
      - orientation.y
      - orientation.z
      - angular_velocity.x
      - angular_velocity.y
      - angular_velocity.z
      - linear_acceleration.x
      - linear_acceleration.y
      - linear_acceleration.z

    foot_force_name: "foot_force"
    foot_force_interfaces:
      - FL_foot_force
      - FR_foot_force
      - RL_foot_force
      - RR_foot_force

unitree_guide_controller:
  ros__parameters:
    update_rate: 200  # Hz
    joints:
      - FR_hip_joint
      - FR_thigh_joint
      - FR_calf_joint
      - FL_hip_joint
      - FL_thigh_joint
      - FL_calf_joint
      - RR_hip_joint
      - RR_thigh_joint
      - RR_calf_joint
      - RL_hip_joint
      - RL_thigh_joint
      - RL_calf_joint

    command_interfaces:
      - effort
      - position
      - velocity
      - kp
      - kd

    state_interfaces:
      - effort
      - position
      - velocity

    feet_names:
      - FR_foot
      - FL_foot
      - RR_foot
      - RL_foot

    imu_name: "imu_sensor"
    base_name: "base"

    imu_interfaces:
      - orientation.w
      - orientation.x
      - orientation.y
      - orientation.z
      - angular_velocity.x
      - angular_velocity.y
      - angular_velocity.z
      - linear_acceleration.x
      - linear_acceleration.y
      - linear_acceleration.z

rl_quadruped_controller:
  ros__parameters:
    update_rate: 200  # Hz
    robot_pkg: "go2_description"
    model_folder: "legged_gym"
    joints:
      - FL_hip_joint
      - FL_thigh_joint
      - FL_calf_joint
      - FR_hip_joint
      - FR_thigh_joint
      - FR_calf_joint
      - RL_hip_joint
      - RL_thigh_joint
      - RL_calf_joint
      - RR_hip_joint
      - RR_thigh_joint
      - RR_calf_joint

    command_interfaces:
      - effort
      - position
      - velocity
      - kp
      - kd

    state_interfaces:
      - effort
      - position
      - velocity
    
    down_pos:
      - 0.01
      - 1.27
      - -2.8
      - -0.01
      - 1.27
      - -2.8
      - 0.3
      - 1.31
      - -2.8
      - -0.3
      - 1.31
      - -2.8

    imu_name: "imu_sensor"
    imu_interfaces:
      - orientation.w
      - orientation.x
      - orientation.y
      - orientation.z
      - angular_velocity.x
      - angular_velocity.y
      - angular_velocity.z
      - linear_acceleration.x
      - linear_acceleration.y
      - linear_acceleration.z
